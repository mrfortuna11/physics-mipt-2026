<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloth — Hitman / PBD / XPBD</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #1a1a1f; color: #ddd;
    font-family: -apple-system, Segoe UI, sans-serif; overflow: hidden; }
  #c { display: block; width: 100vw; height: 100vh; }
  #panel {
    position: absolute; top: 10px; left: 10px; width: 280px;
    background: rgba(20,20,28,0.88); border: 1px solid #333; border-radius: 8px;
    padding: 12px 14px; font-size: 12px; backdrop-filter: blur(6px);
  }
  #panel h2 { margin: 0 0 8px 0; font-size: 13px; color: #8ab4f8; }
  #panel .row { display: flex; align-items: center; justify-content: space-between; margin: 4px 0; gap: 6px; }
  #panel label { color: #aaa; flex: 1; }
  #panel .val { color: #fff; width: 44px; text-align: right; font-variant-numeric: tabular-nums; }
  #panel input[type=range] { flex: 1.2; accent-color: #8ab4f8; }
  #panel select, #panel button {
    background: #2a2a34; color: #eee; border: 1px solid #444; border-radius: 4px;
    padding: 5px 8px; font-size: 12px; cursor: pointer; width: 100%;
  }
  #panel button { margin-top: 4px; }
  #panel button:hover { background: #353544; }
  #panel hr { border: none; border-top: 1px solid #333; margin: 8px 0; }
  #info {
    position: absolute; bottom: 10px; left: 10px;
    background: rgba(20,20,28,0.8); padding: 8px 12px; border-radius: 6px;
    font-size: 11px; color: #aaa;
  }
  #stats { color: #8ab4f8; }
  .chk { display: flex; align-items: center; gap: 6px; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="panel">
  <h2>Cloth Simulation</h2>

  <div class="row"><label>Solver</label></div>
  <select id="solver">
    <option value="JAK">Hitman</option>
    <option value="PBD">PBD</option>
    <option value="XPBD" selected>XPBD</option>
  </select>

  <div class="row" style="margin-top:6px"><label>Scene</label></div>
  <select id="scene">
    <option value="hang">1. Hanging (pinned corners)</option>
    <option value="fall">2. Falling on floor (self-coll)</option>
    <option value="stretch">3. Overstretched (conflict)</option>
    <option value="ball">4. Rigid ball (bonus)</option>
  </select>

  <hr>

  <div class="row"><label>Iterations</label><input type="range" id="iters" min="1" max="40" value="10"><span class="val" id="itersVal">10</span></div>
  <div class="row"><label>Substeps</label><input type="range" id="subs" min="1" max="10" value="1"><span class="val" id="subsVal">1</span></div>
  <div class="row"><label>Stiffness (PBD/Hitman)</label><input type="range" id="stiff" min="0" max="1" step="0.01" value="1"><span class="val" id="stiffVal">1.00</span></div>
  <div class="row"><label>Compliance (XPBD)</label><input type="range" id="comp" min="0" max="0.01" step="0.00005" value="0"><span class="val" id="compVal">0.0000</span></div>
  <div class="row"><label>Friction</label><input type="range" id="fric" min="0" max="1" step="0.01" value="0.3"><span class="val" id="fricVal">0.30</span></div>
  <div class="row"><label>Restitution</label><input type="range" id="rest" min="0" max="1" step="0.01" value="0.15"><span class="val" id="restVal">0.15</span></div>
  <div class="row"><label>Damping</label><input type="range" id="damp" min="0" max="2" step="0.01" value="0.05"><span class="val" id="dampVal">0.05</span></div>
  <div class="row"><label>Gravity</label><input type="range" id="grav" min="0" max="30" step="0.1" value="9.8"><span class="val" id="gravVal">9.8</span></div>
  <div class="row"><label>Particle radius</label><input type="range" id="prad" min="0.02" max="0.12" step="0.005" value="0.05"><span class="val" id="pradVal">0.05</span></div>

  <hr>
  <div class="row chk"><input type="checkbox" id="selfColl" checked><label for="selfColl">Self collisions (spheres)</label></div>
  <div class="row chk"><input type="checkbox" id="showEdges"><label for="showEdges">Show constraint edges</label></div>
  <div class="row chk"><input type="checkbox" id="showPts"><label for="showPts">Show collision spheres</label></div>

  <button id="restart">Restart scene</button>
  <button id="pauseBtn">Pause</button>
</div>

<div id="info">
  <div><b>Drag</b> points with left mouse · <b>Right-drag</b> orbit · <b>Wheel</b> zoom</div>
  <div id="stats">—</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>


const V3 = THREE.Vector3;

// ---------- Particle system ----------
class Sim {
  constructor() {
    this.P = [];          // particles: [{pos,prev,vel,w,r}]
    this.C = [];          // constraints: [{i,j,rest,lambda,comp}]
    this.pinned = new Set();

    // Tunables (overwritten from UI)
    this.solver = 'XPBD';
    this.iters = 10; this.substeps = 1;
    this.stiffness = 1.0; this.compliance = 0.0;
    this.friction = 0.3; this.restitution = 0.15; this.damping = 0.05;
    this.gravity = 9.8; this.particleRadius = 0.05; this.selfColl = true;

    // Mouse grab
    this.grabIdx = -1; this.grabTarget = new V3(); this.grabStoreW = 0;
  }

  addParticle(p, mass = 1) {
    this.P.push({
      pos: p.clone(), prev: p.clone(), vel: new V3(),
      w: mass > 0 ? 1 / mass : 0, r: this.particleRadius,
    });
    return this.P.length - 1;
  }

  addConstraint(i, j, compOverride = null) {
    const rest = this.P[i].pos.distanceTo(this.P[j].pos);
    this.C.push({ i, j, rest, lambda: 0, comp: compOverride });
  }

  pin(idx) { this.P[idx].w = 0; this.pinned.add(idx); }

  // ---- update particle radii on the fly ----
  updateRadii() { for (const p of this.P) p.r = this.particleRadius; }

  // ---- step ----
  step(dt) {
    const h = dt / this.substeps;
    for (let s = 0; s < this.substeps; s++) this.substep(h);
  }

  substep(h) {
    const g = -this.gravity;
    // Predict: x_{n+1} = x_n + h*v_n + h^2*g
    for (const p of this.P) {
      if (p.w === 0) { p.prev.copy(p.pos); continue; }
      p.prev.copy(p.pos);
      p.vel.y += g * h;
      // velocity damping (global)
      p.vel.multiplyScalar(Math.max(0, 1 - this.damping * h));
      p.pos.addScaledVector(p.vel, h);
    }

    // Reset XPBD lagrange multipliers each substep
    if (this.solver === 'XPBD') for (const c of this.C) c.lambda = 0;

    // Gauss-Seidel iterations
    for (let k = 0; k < this.iters; k++) {
      this.solveDistance(h);
      this.solveFloor();
      if (this.selfColl) this.solveSelf();
      this.applyGrab();
    }

    // Velocity update + sliding friction from floor (velocity level)
    for (const p of this.P) {
      if (p.w === 0) { p.vel.set(0, 0, 0); continue; }
      p.vel.subVectors(p.pos, p.prev).multiplyScalar(1 / h);
    }
  }

  // ------- distance constraints (the three solvers differ here) -------
  solveDistance(h) {
    const d = _tmp1;
    if (this.solver === 'JAK') {
      const kIter = 1 - Math.pow(1 - this.stiffness, 1 / this.iters);
      for (const c of this.C) {
        const a = this.P[c.i], b = this.P[c.j];
        const w = a.w + b.w; if (w === 0) continue;
        d.subVectors(b.pos, a.pos);
        const len = d.length(); if (len < 1e-9) continue;
        const diff = (len - c.rest) / len;       // directional fraction
        const f = kIter * diff / w;
        a.pos.addScaledVector(d, f * a.w);
        b.pos.addScaledVector(d, -f * b.w);
      }
    } else if (this.solver === 'PBD') {
      const kIter = 1 - Math.pow(1 - this.stiffness, 1 / this.iters);
      for (const c of this.C) {
        const a = this.P[c.i], b = this.P[c.j];
        const w = a.w + b.w; if (w === 0) continue;
        d.subVectors(a.pos, b.pos);
        const len = d.length(); if (len < 1e-9) continue;
        const C = len - c.rest;
        const s = -C / w * kIter;
        const nx = d.x / len, ny = d.y / len, nz = d.z / len;
        a.pos.x += s * a.w * nx;  a.pos.y += s * a.w * ny;  a.pos.z += s * a.w * nz;
        b.pos.x -= s * b.w * nx;  b.pos.y -= s * b.w * ny;  b.pos.z -= s * b.w * nz;
      }
    } else { // XPBD
      const hh = h * h;
      for (const c of this.C) {
        const a = this.P[c.i], b = this.P[c.j];
        const w = a.w + b.w; if (w === 0) continue;
        const compliance = (c.comp !== null ? c.comp : this.compliance);
        const alpha = compliance / hh;
        d.subVectors(a.pos, b.pos);
        const len = d.length(); if (len < 1e-9) continue;
        const C = len - c.rest;
        const dLambda = (-C - alpha * c.lambda) / (w + alpha);
        c.lambda += dLambda;
        const nx = d.x / len, ny = d.y / len, nz = d.z / len;
        a.pos.x += dLambda * a.w * nx;  a.pos.y += dLambda * a.w * ny;  a.pos.z += dLambda * a.w * nz;
        b.pos.x -= dLambda * b.w * nx;  b.pos.y -= dLambda * b.w * ny;  b.pos.z -= dLambda * b.w * nz;
      }
    }
  }

  solveFloor() {
    const fr = this.friction;
    const e = this.restitution;
    for (const p of this.P) {
      if (p.w === 0) continue;
      const penetration = p.r - p.pos.y;
      if (penetration > 0) {
        const vyOrig = p.pos.y - p.prev.y;   // negative if moving down
        p.pos.y = p.r;
        // Horizontal displacement since prev → scrub by friction
        const dx = p.pos.x - p.prev.x;
        const dz = p.pos.z - p.prev.z;
        p.pos.x -= dx * fr;
        p.pos.z -= dz * fr;
        // Elastic bounce: set prev.y so that (pos.y - prev.y)/h = -e * vyOrig/h
        if (vyOrig < 0) p.prev.y = p.r + e * vyOrig;  // prev below pos → upward vel
      }
    }
  }

  // ------- self collision via spatial hash on dynamic spheres -------
  solveSelf() {
    const r = this.particleRadius;
    const cell = Math.max(2 * r, 1e-4);
    const inv = 1 / cell;
    const hash = new Map();
    const hk = (ix, iy, iz) => (ix * 73856093) ^ (iy * 19349663) ^ (iz * 83492791);

    for (let i = 0; i < this.P.length; i++) {
      const p = this.P[i].pos;
      const k = hk(Math.floor(p.x * inv), Math.floor(p.y * inv), Math.floor(p.z * inv));
      let a = hash.get(k); if (!a) { a = []; hash.set(k, a); }
      a.push(i);
    }

    const fr = this.friction;
    const d = _tmp2, relTan = _tmp3;
    for (let i = 0; i < this.P.length; i++) {
      const pi = this.P[i], pp = pi.pos;
      const cx = Math.floor(pp.x * inv), cy = Math.floor(pp.y * inv), cz = Math.floor(pp.z * inv);
      for (let ox = -1; ox <= 1; ox++)
      for (let oy = -1; oy <= 1; oy++)
      for (let oz = -1; oz <= 1; oz++) {
        const arr = hash.get(hk(cx + ox, cy + oy, cz + oz));
        if (!arr) continue;
        for (const j of arr) {
          if (j <= i) continue;
          const pj = this.P[j];
          const w = pi.w + pj.w; if (w === 0) continue;
          const minD = pi.r + pj.r;
          d.subVectors(pj.pos, pi.pos);
          const len2 = d.x * d.x + d.y * d.y + d.z * d.z;
          if (len2 >= minD * minD || len2 < 1e-12) continue;
          const len = Math.sqrt(len2);
          const corr = (minD - len) / w;
          const nx = d.x / len, ny = d.y / len, nz = d.z / len;
          pi.pos.x -= corr * pi.w * nx; pi.pos.y -= corr * pi.w * ny; pi.pos.z -= corr * pi.w * nz;
          pj.pos.x += corr * pj.w * nx; pj.pos.y += corr * pj.w * ny; pj.pos.z += corr * pj.w * nz;

          // Tangential friction: scrub relative displacement since prev
          if (fr > 0) {
            const rjx = pj.pos.x - pj.prev.x, rjy = pj.pos.y - pj.prev.y, rjz = pj.pos.z - pj.prev.z;
            const rix = pi.pos.x - pi.prev.x, riy = pi.pos.y - pi.prev.y, riz = pi.pos.z - pi.prev.z;
            let tx = rjx - rix, ty = rjy - riy, tz = rjz - riz;
            const tn = tx * nx + ty * ny + tz * nz;
            tx -= tn * nx; ty -= tn * ny; tz -= tn * nz;
            const f = fr * 0.5;
            pi.pos.x += f * pi.w / w * tx; pi.pos.y += f * pi.w / w * ty; pi.pos.z += f * pi.w / w * tz;
            pj.pos.x -= f * pj.w / w * tx; pj.pos.y -= f * pj.w / w * ty; pj.pos.z -= f * pj.w / w * tz;
          }
        }
      }
    }
  }

  applyGrab() {
    if (this.grabIdx < 0) return;
    this.P[this.grabIdx].pos.copy(this.grabTarget);
  }

  startGrab(i, target) {
    if (i < 0) return;
    this.grabIdx = i;
    this.grabStoreW = this.P[i].w;
    this.P[i].w = 0;
    this.grabTarget.copy(target);
  }
  moveGrab(target) { this.grabTarget.copy(target); }
  endGrab() {
    if (this.grabIdx < 0) return;
    if (!this.pinned.has(this.grabIdx)) this.P[this.grabIdx].w = this.grabStoreW;
    this.grabIdx = -1;
  }
}

const _tmp1 = new V3(), _tmp2 = new V3(), _tmp3 = new V3();

function buildCloth(sim, N, spacing, origin, pins = []) {
  const base = sim.P.length;
  for (let y = 0; y < N; y++)
    for (let x = 0; x < N; x++) {
      const p = new V3(
        origin.x + (x - (N - 1) / 2) * spacing,
        origin.y,
        origin.z + (y - (N - 1) / 2) * spacing
      );
      sim.addParticle(p, 1);
    }
  const idx = (x, y) => base + y * N + x;

  // Structural
  for (let y = 0; y < N; y++)
    for (let x = 0; x < N; x++) {
      if (x + 1 < N) sim.addConstraint(idx(x, y), idx(x + 1, y));
      if (y + 1 < N) sim.addConstraint(idx(x, y), idx(x, y + 1));
    }
  // Shear
  for (let y = 0; y < N - 1; y++)
    for (let x = 0; x < N - 1; x++) {
      sim.addConstraint(idx(x, y), idx(x + 1, y + 1));
      sim.addConstraint(idx(x + 1, y), idx(x, y + 1));
    }
  // Bending (reach-2)
  for (let y = 0; y < N; y++)
    for (let x = 0; x < N; x++) {
      if (x + 2 < N) sim.addConstraint(idx(x, y), idx(x + 2, y));
      if (y + 2 < N) sim.addConstraint(idx(x, y), idx(x, y + 2));
    }

  for (const [px, py] of pins) sim.pin(idx(px, py));

  // Triangles for rendering
  const tris = [];
  for (let y = 0; y < N - 1; y++)
    for (let x = 0; x < N - 1; x++) {
      const a = idx(x, y), b = idx(x + 1, y), c = idx(x, y + 1), d = idx(x + 1, y + 1);
      tris.push(a, b, c, b, d, c);
    }
  return { base, N, tris };
}

function buildBall(sim, origin, radius, rings = 8) {
  const base = sim.P.length;
  const seg = rings * 2;
  const surface = [];
  // top pole
  surface.push(sim.addParticle(new V3(origin.x, origin.y + radius, origin.z)));
  for (let r = 1; r < rings; r++) {
    const phi = Math.PI * r / rings;
    const y = radius * Math.cos(phi);
    const rr = radius * Math.sin(phi);
    for (let s = 0; s < seg; s++) {
      const th = 2 * Math.PI * s / seg;
      surface.push(sim.addParticle(new V3(
        origin.x + rr * Math.cos(th),
        origin.y + y,
        origin.z + rr * Math.sin(th)
      )));
    }
  }
  // bottom pole
  surface.push(sim.addParticle(new V3(origin.x, origin.y - radius, origin.z)));
  // center particle (gives us rigid spokes)
  const center = sim.addParticle(new V3(origin.x, origin.y, origin.z));

  // Connect surface particles to all neighbours within a threshold (rigid)
  const maxD = (2 * Math.PI * radius / seg) * 2.4;
  const RIGID = 0; // compliance 0 → hard
  for (let i = 0; i < surface.length; i++) {
    for (let j = i + 1; j < surface.length; j++) {
      const a = sim.P[surface[i]].pos, b = sim.P[surface[j]].pos;
      if (a.distanceTo(b) <= maxD) sim.addConstraint(surface[i], surface[j], RIGID);
    }
    // spoke to center
    sim.addConstraint(surface[i], center, RIGID);
  }

  // Build triangles for rendering (lat-lon sphere)
  const tris = [];
  // top cap
  for (let s = 0; s < seg; s++) {
    const a = base + 0;
    const b = base + 1 + s;
    const c = base + 1 + ((s + 1) % seg);
    tris.push(a, b, c);
  }
  for (let r = 0; r < rings - 2; r++) {
    for (let s = 0; s < seg; s++) {
      const a = base + 1 + r * seg + s;
      const b = base + 1 + r * seg + ((s + 1) % seg);
      const c = base + 1 + (r + 1) * seg + s;
      const d = base + 1 + (r + 1) * seg + ((s + 1) % seg);
      tris.push(a, c, b, b, c, d);
    }
  }
  // bottom cap
  const botIdx = base + 1 + (rings - 1) * seg;
  for (let s = 0; s < seg; s++) {
    const a = botIdx;
    const b = base + 1 + (rings - 2) * seg + ((s + 1) % seg);
    const c = base + 1 + (rings - 2) * seg + s;
    tris.push(a, b, c);
  }
  return { tris };
}

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a1f);
scene.fog = new THREE.Fog(0x1a1a1f, 8, 25);

const camera = new THREE.PerspectiveCamera(55, 1, 0.01, 200);
camera.position.set(0, 3, 6);
camera.lookAt(0, 1.2, 0);

scene.add(new THREE.AmbientLight(0xffffff, 0.35));
const dir = new THREE.DirectionalLight(0xffffff, 1.0);
dir.position.set(3, 8, 4); scene.add(dir);
const dir2 = new THREE.DirectionalLight(0x88aaff, 0.4);
dir2.position.set(-4, 3, -3); scene.add(dir2);

// Floor
const floorGeo = new THREE.PlaneGeometry(30, 30, 30, 30);
floorGeo.rotateX(-Math.PI / 2);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x25252e, roughness: 0.9 });
scene.add(new THREE.Mesh(floorGeo, floorMat));
// Grid for reference
const grid = new THREE.GridHelper(30, 30, 0x444455, 0x333340);
grid.position.y = 0.002;
scene.add(grid);


let sim = new Sim();
let renderables = [];   

function clearRenderables() {
  for (const r of renderables) {
    if (r.meshTri) { scene.remove(r.meshTri); r.meshTri.geometry.dispose(); }
    if (r.meshLine) { scene.remove(r.meshLine); r.meshLine.geometry.dispose(); }
    if (r.ptPoints) { scene.remove(r.ptPoints); r.ptPoints.geometry.dispose(); }
  }
  renderables = [];
}

function makeRenderable(firstIdx, lastIdx, tris, color) {
  const n = lastIdx - firstIdx;
  const posAttr = new THREE.Float32BufferAttribute(new Float32Array(n * 3), 3);
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', posAttr);
  geo.setIndex(tris.map(i => i - firstIdx));
  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.7, side: THREE.DoubleSide, flatShading: false });
  const meshTri = new THREE.Mesh(geo, mat);
  scene.add(meshTri);

  // Edge lines (from constraints restricted to this object)
  const lineGeo = new THREE.BufferGeometry();
  const lineMat = new THREE.LineBasicMaterial({ color: 0x88ccff, transparent: true, opacity: 0.5 });
  const meshLine = new THREE.LineSegments(lineGeo, lineMat);
  meshLine.visible = false;
  scene.add(meshLine);

  // Collision spheres as points
  const ptGeo = new THREE.BufferGeometry();
  ptGeo.setAttribute('position', new THREE.Float32BufferAttribute(new Float32Array(n * 3), 3));
  const ptMat = new THREE.PointsMaterial({ color: 0xffaa44, size: 0.1, sizeAttenuation: true });
  const ptPoints = new THREE.Points(ptGeo, ptMat);
  ptPoints.visible = false;
  scene.add(ptPoints);

  return { meshTri, meshLine, ptPoints, tris, firstIdx, lastIdx };
}

function updateRenderables() {
  for (const r of renderables) {
    // triangle positions
    const pa = r.meshTri.geometry.attributes.position.array;
    let k = 0;
    for (let i = r.firstIdx; i < r.lastIdx; i++) {
      const p = sim.P[i].pos;
      pa[k++] = p.x; pa[k++] = p.y; pa[k++] = p.z;
    }
    r.meshTri.geometry.attributes.position.needsUpdate = true;
    r.meshTri.geometry.computeVertexNormals();
    r.meshTri.geometry.computeBoundingSphere();

    // points
    if (r.ptPoints.visible) {
      const pp = r.ptPoints.geometry.attributes.position.array;
      let j = 0;
      for (let i = r.firstIdx; i < r.lastIdx; i++) {
        const p = sim.P[i].pos;
        pp[j++] = p.x; pp[j++] = p.y; pp[j++] = p.z;
      }
      r.ptPoints.geometry.attributes.position.needsUpdate = true;
      r.ptPoints.material.size = sim.particleRadius * 2;
    }

    // lines
    if (r.meshLine.visible) {
      const linePos = r.meshLine.geometry.attributes.position;
      const arr = linePos.array;
      let m = 0;
      for (const c of sim.C) {
        if (c.i < r.firstIdx || c.i >= r.lastIdx) continue;
        const a = sim.P[c.i].pos, b = sim.P[c.j].pos;
        arr[m++] = a.x; arr[m++] = a.y; arr[m++] = a.z;
        arr[m++] = b.x; arr[m++] = b.y; arr[m++] = b.z;
      }
      linePos.needsUpdate = true;
    }
  }
}

function buildEdgeBuffers() {
  for (const r of renderables) {
    let count = 0;
    for (const c of sim.C) {
      if (c.i >= r.firstIdx && c.i < r.lastIdx) count++;
    }
    const arr = new Float32Array(count * 6);
    r.meshLine.geometry.setAttribute('position', new THREE.BufferAttribute(arr, 3));
  }
}

function loadScene(name) {
  clearRenderables();
  sim = new Sim();
  applyParamsToSim();

  if (name === 'hang') {
    const N = 22;
    const r = buildCloth(sim, N, 0.12, new V3(0, 3.2, 0), [
      [0, 0], [N - 1, 0], [0, N - 1], [N - 1, N - 1],
    ]);
    renderables.push(makeRenderable(r.base, r.base + N * N, r.tris, 0xe06060));
  }
  else if (name === 'fall') {
    const N = 20;
    const r = buildCloth(sim, N, 0.13, new V3(0, 2.0, 0), []);
    // Give some initial crumpling so it piles up on the floor
    for (let i = r.base; i < r.base + N * N; i++) {
      sim.P[i].pos.y += (Math.random() - 0.5) * 0.1;
      sim.P[i].pos.x += (Math.random() - 0.5) * 0.03;
      sim.P[i].prev.copy(sim.P[i].pos);
    }
    renderables.push(makeRenderable(r.base, r.base + N * N, r.tris, 0x60b060));

    const b = buildBall(sim, new V3(0, 4.5, 0.2), 0.55, 8);
    const bFirst = r.base + N * N;
    const ballCount = sim.P.length - bFirst;
    renderables.push(makeRenderable(bFirst, bFirst + ballCount, b.tris, 0x8080e0));
  }
  else if (name === 'stretch') {
    const N = 18;
    const r = buildCloth(sim, N, 0.12, new V3(0, 2.5, 0), [
      [0, 0], [N - 1, N - 1],
    ]);

    const natural = (N - 1) * 0.12 * Math.SQRT2;   // original diagonal
    const target = natural * 2.2;
    const topIdx = r.base + 0;
    const botIdx = r.base + (N - 1) * N + (N - 1);
    sim.P[topIdx].pos.set(-target / 2, 3.0, -target / 2);
    sim.P[topIdx].prev.copy(sim.P[topIdx].pos);
    sim.P[botIdx].pos.set(target / 2, 3.0, target / 2);
    sim.P[botIdx].prev.copy(sim.P[botIdx].pos);
    renderables.push(makeRenderable(r.base, r.base + N * N, r.tris, 0xe0a040));
  }
  else if (name === 'ball') {
    const b = buildBall(sim, new V3(0, 3.0, 0), 0.8, 10);
    const n = sim.P.length;
    renderables.push(makeRenderable(0, n, b.tris, 0x8080e0));
    const N = 14;
    const r = buildCloth(sim, N, 0.14, new V3(0, 5.0, 0), []);
    renderables.push(makeRenderable(r.base, r.base + N * N, r.tris, 0xe06060));
  }

  buildEdgeBuffers();
  updateRenderables();
  updateVisibility();
}


function bind(id, fn, isFloat = true) {
  const el = document.getElementById(id);
  const vel = document.getElementById(id + 'Val');
  let dec = 2;
  if (isFloat && el.step) {
    const s = parseFloat(el.step);
    if (s > 0) dec = Math.max(0, Math.min(5, -Math.floor(Math.log10(s))));
  }
  const upd = () => {
    const v = isFloat ? parseFloat(el.value) : parseInt(el.value);
    if (vel) vel.textContent = isFloat ? v.toFixed(dec) : v;
    fn(v);
  };
  el.addEventListener('input', upd); upd();
}

bind('iters', v => sim.iters = v, false);
bind('subs', v => sim.substeps = v, false);
bind('stiff', v => sim.stiffness = v);
bind('comp', v => sim.compliance = v);
bind('fric', v => sim.friction = v);
bind('rest', v => sim.restitution = v);
bind('damp', v => sim.damping = v);
bind('grav', v => sim.gravity = v);
bind('prad', v => { sim.particleRadius = v; sim.updateRadii(); });

function applyParamsToSim() {
  sim.iters = parseInt(document.getElementById('iters').value);
  sim.substeps = parseInt(document.getElementById('subs').value);
  sim.stiffness = parseFloat(document.getElementById('stiff').value);
  sim.compliance = parseFloat(document.getElementById('comp').value);
  sim.friction = parseFloat(document.getElementById('fric').value);
  sim.restitution = parseFloat(document.getElementById('rest').value);
  sim.damping = parseFloat(document.getElementById('damp').value);
  sim.gravity = parseFloat(document.getElementById('grav').value);
  sim.particleRadius = parseFloat(document.getElementById('prad').value);
  sim.solver = document.getElementById('solver').value;
  sim.selfColl = document.getElementById('selfColl').checked;
  sim.updateRadii();
}

document.getElementById('solver').addEventListener('change', e => sim.solver = e.target.value);
document.getElementById('scene').addEventListener('change', e => loadScene(e.target.value));
document.getElementById('restart').addEventListener('click', () => loadScene(document.getElementById('scene').value));
let paused = false;
document.getElementById('pauseBtn').addEventListener('click', e => {
  paused = !paused; e.target.textContent = paused ? 'Resume' : 'Pause';
});
document.getElementById('selfColl').addEventListener('change', e => sim.selfColl = e.target.checked);
document.getElementById('showEdges').addEventListener('change', updateVisibility);
document.getElementById('showPts').addEventListener('change', updateVisibility);

function updateVisibility() {
  const edges = document.getElementById('showEdges').checked;
  const pts = document.getElementById('showPts').checked;
  for (const r of renderables) {
    r.meshLine.visible = edges;
    r.ptPoints.visible = pts;
  }
}

const camState = {
  target: new V3(0, 1.2, 0),
  radius: 7, theta: -Math.PI / 6, phi: Math.PI / 3,
};
function updateCam() {
  camera.position.set(
    camState.target.x + camState.radius * Math.sin(camState.phi) * Math.sin(camState.theta),
    camState.target.y + camState.radius * Math.cos(camState.phi),
    camState.target.z + camState.radius * Math.sin(camState.phi) * Math.cos(camState.theta)
  );
  camera.lookAt(camState.target);
}
updateCam();

const ray = new THREE.Raycaster();
const mouseNdc = new THREE.Vector2();
let dragMode = null;   // 'orbit' | 'grab' | null
let lastMouse = { x: 0, y: 0 };
let grabPlane = new THREE.Plane();

function pickParticle(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  mouseNdc.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  mouseNdc.y = -((clientY - rect.top) / rect.height) * 2 + 1;
  ray.setFromCamera(mouseNdc, camera);
  let best = -1, bestT = Infinity;
  const tmp = _tmp1;
  for (let i = 0; i < sim.P.length; i++) {
    const p = sim.P[i].pos;
    tmp.copy(p).sub(ray.ray.origin);
    const t = tmp.dot(ray.ray.direction);
    if (t < 0) continue;
    const perp2 = tmp.lengthSq() - t * t;
    const r = sim.P[i].r * 1.5;
    if (perp2 < r * r && t < bestT) { bestT = t; best = i; }
  }
  return best;
}

canvas.addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('mousedown', e => {
  lastMouse.x = e.clientX; lastMouse.y = e.clientY;
  if (e.button === 2) { dragMode = 'orbit'; return; }
  if (e.button === 0) {
    const pi = pickParticle(e.clientX, e.clientY);
    if (pi >= 0) {
      dragMode = 'grab';
      // Set a plane through the particle facing the camera
      const n = new V3().subVectors(camera.position, sim.P[pi].pos).normalize();
      grabPlane.setFromNormalAndCoplanarPoint(n, sim.P[pi].pos);
      sim.startGrab(pi, sim.P[pi].pos);
    } else {
      dragMode = 'orbit';
    }
  }
});
canvas.addEventListener('mousemove', e => {
  const dx = e.clientX - lastMouse.x, dy = e.clientY - lastMouse.y;
  lastMouse.x = e.clientX; lastMouse.y = e.clientY;
  if (dragMode === 'orbit') {
    camState.theta -= dx * 0.008;
    camState.phi = Math.max(0.12, Math.min(Math.PI - 0.12, camState.phi - dy * 0.008));
    updateCam();
  } else if (dragMode === 'grab') {
    const rect = canvas.getBoundingClientRect();
    mouseNdc.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouseNdc.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    ray.setFromCamera(mouseNdc, camera);
    const hit = new V3();
    if (ray.ray.intersectPlane(grabPlane, hit)) sim.moveGrab(hit);
  }
});
window.addEventListener('mouseup', () => {
  if (dragMode === 'grab') sim.endGrab();
  dragMode = null;
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  camState.radius *= (1 + e.deltaY * 0.001);
  camState.radius = Math.max(1.5, Math.min(30, camState.radius));
  updateCam();
}, { passive: false });

function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h; camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize); resize();

const statsEl = document.getElementById('stats');
let frameTimes = [];

function loop() {
  const t0 = performance.now();
  if (!paused) sim.step(1 / 60);
  updateRenderables();
  renderer.render(scene, camera);
  const dt = performance.now() - t0;
  frameTimes.push(dt);
  if (frameTimes.length > 30) frameTimes.shift();
  const avg = frameTimes.reduce((a, b) => a + b, 0) / frameTimes.length;
  statsEl.textContent =
    `${sim.solver} · ${sim.P.length} pts · ${sim.C.length} constraints · ${avg.toFixed(1)} ms/frame`;
  requestAnimationFrame(loop);
}

loadScene('hang');
loop();
</script>
